<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://prog2700.onrender.com/">
    <title>PROG 2700 - Assignment 4B</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>3-In-A-Row</h1>
    </header>

    <main>
        <div id="gameSelect">
            <label for="gameLevelSelect">Game level:</label>
            <select name="gameLevelSelect" id="gameLevelSelect">
                <hr />
                <optgroup label="Standard levels">
                    <option value="6x6">6x6 Grid</option>
                    <option value="8x8">8x8 Grid</option>
                    <option value="10x10">10x10 Grid</option>
                    <option value="12x12">12x12 Grid</option>
                    <option value="14x14">14x14 Grid</option>
                </optgroup>
                <hr />
                <optgroup label="Other levels">
                    <option value="sample" title="A predefined 6x6 sample grid">Sample Grid</option>
                    <option value="random" title="A randomly sized grid">Random Grid</option>
                </optgroup>
            </select>
        </div>

        <div id="gameGrid">
            <!-- This element is overwritten by JavaScript -->
            <noscript>JavaScript is required.</noscript>
        </div>

        <div id="gameControls">
            <div>
                <button id="gameCheckBtn" title="Checks for mistakes">Check</button>
                <button id="gameAnswerBtn" title="See the solution to this game">Answer</button>
                <button id="gameRestartBtn" title="Restart this game">Restart</button>
                <button id="gameNewBtn" title="Start a new game">New</button>
            </div>
            <div>
                <input type="checkbox" name="gameShowIncorrect" id="gameShowIncorrect">
                <label for="gameShowIncorrect">Show incorrect squares</label>
            </div>
        </div>
    </main>

    <footer>Made by Benjamin P. C. Hovinga.</footer>

    <script src="index.js"></script>
</body>

</html>
